services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frontdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frontdesk"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/frontdesk
      WEB_ORIGIN: http://localhost:3000
      AUTH_SHARED_SECRET: ${AUTH_SHARED_SECRET:-dev-shared-secret-change-me}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    # Mount the host AWS credentials read-only so Bedrock works in the container
    # (boto3's default chain reads /root/.aws). Falls back to the mock LLM if absent.
    volumes:
      - ${USERPROFILE:-${HOME}}/.aws:/root/.aws:ro
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Server-side calls (Auth.js authorize, server components) use the
      # compose service name; the browser doesn't call the API directly yet.
      API_BASE_URL: http://api:8000
      AUTH_SECRET: ${AUTH_SECRET:-dev-web-auth-secret-change-me}
      AUTH_SHARED_SECRET: ${AUTH_SHARED_SECRET:-dev-shared-secret-change-me}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
