services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frontdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frontdesk"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    # AWS creds (and any overrides) come from api/.env — see api/.env.example.
    # Optional: without it, the API runs with the mock LLM (bedrock:false).
    env_file:
      - path: ./api/.env
        required: false
    environment:
      # These win over env_file — container-network values, not local ones.
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/frontdesk
      WEB_ORIGIN: http://localhost:3000
      AUTH_SHARED_SECRET: ${AUTH_SHARED_SECRET:-dev-shared-secret-change-me}
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Server-side calls (Auth.js authorize, server components) use the
      # compose service name; the browser doesn't call the API directly yet.
      API_BASE_URL: http://api:8000
      AUTH_SECRET: ${AUTH_SECRET:-dev-web-auth-secret-change-me}
      AUTH_SHARED_SECRET: ${AUTH_SHARED_SECRET:-dev-shared-secret-change-me}
      AUTH_TRUST_HOST: "true"
      # Auth.js needs the canonical base URL for callback/redirect resolution.
      # The Next standalone server binds 0.0.0.0, and host inference resolves to
      # that (unusable), so this must be set to the URL clients actually use.
      # Default localhost = same-machine. For phone / LAN access, set it to this
      # machine's LAN URL, e.g.:
      #   AUTH_URL=http://10.0.0.156:3000 docker compose up -d web
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
